<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Démo - Interface inspirée de Roblox</title>

<style>
body{
    margin:0;
    background:#1b1b1b;
    font-family:Arial, Helvetica, sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.login-box{
    width:360px;
    background:#232527;
    padding:35px;
    border-radius:10px;
    box-shadow:0 0 20px rgba(0,0,0,.4);
}

h1{
    color:white;
    text-align:center;
    margin-bottom:5px;
}

.demo{
    text-align:center;
    color:#888;
    font-size:14px;
    margin-bottom:25px;
}

input{
    width:100%;
    padding:13px;
    margin-bottom:15px;
    border:none;
    border-radius:8px;
    background:#393b3d;
    color:white;
    font-size:15px;
    box-sizing:border-box;
}

input::placeholder{
    color:#bdbdbd;
}

button{
    width:100%;
    padding:13px;
    border:none;
    border-radius:8px;
    background:white;
    color:black;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#e6e6e6;
}

a{
    display:block;
    text-align:center;
    color:#bdbdbd;
    margin-top:18px;
    text-decoration:none;
}

a:hover{
    color:white;
}
</style>

</head>

<body>

<div class="login-box">
    <h1>Connexion</h1>
    <div class="demo">Démonstration d'interface inspirée de Roblox</div>

    <input type="text" placeholder="Nom d'utilisateur ou e-mail">
    <input type="password" placeholder="Mot de passe">

    <button>Se connecter</button>

    <a href="#">Mot de passe oublié ?</a>
</div>

</body>
</html>
